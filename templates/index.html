<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Panel · Telnyx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #17171f;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent-dim: rgba(0, 229, 160, 0.12);
    --accent-glow: rgba(0, 229, 160, 0.25);
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --text-muted: #3a3a50;
    --out-bubble: #00c78a;
    --out-text: #001a12;
    --in-bubble: #1a1a26;
    --red: #ff4d6a;
    --yellow: #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 20px var(--accent-glow); }
  }

  .brand-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .my-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  #contacts-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .contact-item {
    padding: 13px 18px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
  }

  .contact-item:hover { background: var(--surface2); }
  .contact-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .contact-info { flex: 1; min-width: 0; }

  .contact-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-preview {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .contact-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }

  .badge {
    background: var(--accent);
    color: var(--out-text);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .btn-new {
    position: absolute;
    bottom: 20px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    font-size: 22px;
    font-weight: 300;
    color: var(--out-text);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-new:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 30px var(--accent-glow);
  }

  /* ─── MAIN CHAT ─── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .empty-text {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  #chat-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .chat-header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .chat-header-info { flex: 1; }

  .chat-contact-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .chat-via {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  #messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-row {
    display: flex;
    animation: msgIn 0.25s cubic-bezier(.4,0,.2,1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.out { justify-content: flex-end; }
  .msg-row.in { justify-content: flex-start; }

  .bubble {
    max-width: 65%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg-row.out .bubble {
    background: var(--out-bubble);
    color: var(--out-text);
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .msg-row.in .bubble {
    background: var(--in-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .bubble-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
  }

  .bubble-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    opacity: 0.5;
  }

  .bubble-status {
    font-size: 9px;
    opacity: 0.6;
  }

  .date-divider {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin: 12px 0 6px;
    position: relative;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* ─── INPUT ─── */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--text-muted); }
  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 18px; height: 18px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.2s cubic-bezier(.4,0,.2,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 0.04em;
  }

  .modal label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-primary { background: var(--accent); color: var(--out-text); }
  .btn-primary:hover { opacity: 0.9; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--red); color: var(--red); }
  #toast.success { border-color: var(--accent); color: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">SMS Panel</span>
    </div>
    <span class="my-num">{{ my_number }}</span>
  </div>

  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Поиск контакта...">
  </div>

  <div id="contacts-list"></div>

  <button class="btn-new" onclick="openNewChat()" title="Новый чат">+</button>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="empty-state">
    <div class="empty-icon">💬</div>
    <div class="empty-text">Выберите контакт</div>
  </div>

  <div id="chat-view">
    <div class="chat-header">
      <div class="chat-header-avatar" id="chat-avatar"></div>
      <div class="chat-header-info">
        <div class="chat-contact-num" id="chat-num"></div>
        <div class="chat-via" id="chat-via"></div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div id="messages-area"></div>

    <div class="input-area">
      <textarea id="msg-input" placeholder="Написать сообщение..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<!-- MODAL: NEW CHAT -->
<div class="modal-overlay" id="new-chat-modal">
  <div class="modal">
    <h3>📲 Новый чат</h3>
    <label>Номер получателя</label>
    <input type="text" id="new-to" placeholder="+13862068173">
    <label>Сообщение</label>
    <input type="text" id="new-body" placeholder="Привет!">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="sendNew()">Отправить</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const MY_NUMBER = "{{ my_number }}";
  let currentContact = null;
  let allContacts = [];
  let pollingTimer = null;

  // ── Contacts ──
  async function loadContacts() {
    try {
      const res = await fetch('/api/contacts');
      allContacts = await res.json();
      renderContacts(allContacts);
    } catch(e) { showToast('Ошибка загрузки контактов', 'error'); }
  }

  function renderContacts(list) {
    const el = document.getElementById('contacts-list');
    if (!list.length) {
      el.innerHTML = `<div style="padding:32px 20px;text-align:center;color:var(--text-muted);font-size:11px;letter-spacing:.08em">НЕТ ПЕРЕПИСОК</div>`;
      return;
    }
    el.innerHTML = list.map(c => {
      const initials = c.contact.slice(-4);
      const time = formatTime(c.last_at);
      const active = currentContact === c.contact ? 'active' : '';
      const badge = c.unread > 0 ? `<span class="badge">${c.unread}</span>` : '';
      return `
        <div class="contact-item ${active}" onclick="openChat('${c.contact}', '${c.my_number}')">
          <div class="avatar">${initials}</div>
          <div class="contact-info">
            <div class="contact-num">${c.contact}</div>
            <div class="contact-preview">via ${c.my_number}</div>
          </div>
          <div class="contact-meta">
            <span class="contact-time">${time}</span>
            ${badge}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    renderContacts(allContacts.filter(c => c.contact.includes(q)));
  });

  // ── Chat ──
  async function openChat(contact, myNum) {
    currentContact = contact;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('chat-view').style.display = 'flex';
    document.getElementById('chat-num').textContent = contact;
    document.getElementById('chat-via').textContent = `через ${myNum || MY_NUMBER}`;
    document.getElementById('chat-avatar').textContent = contact.slice(-4);
    renderContacts(allContacts); // re-render to update active state
    await loadMessages();
    startPolling();
  }

  async function loadMessages() {
    if (!currentContact) return;
    try {
      const res = await fetch(`/api/messages/${encodeURIComponent(currentContact)}`);
      const msgs = await res.json();
      renderMessages(msgs);
    } catch(e) {}
  }

  function renderMessages(msgs) {
    const area = document.getElementById('messages-area');
    const wasBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

    let lastDate = null;
    let html = '';
    msgs.forEach(m => {
      const d = m.created_at.slice(0, 10);
      if (d !== lastDate) {
        html += `<div class="date-divider">${formatDate(d)}</div>`;
        lastDate = d;
      }
      const dir = m.direction === 'outbound' ? 'out' : 'in';
      const time = m.created_at.slice(11, 16);
      const statusIcon = m.direction === 'outbound' ? `<span class="bubble-status">${statusEmoji(m.status)}</span>` : '';
      html += `
        <div class="msg-row ${dir}">
          <div class="bubble">
            ${escHtml(m.body)}
            <div class="bubble-meta">
              <span class="bubble-time">${time}</span>
              ${statusIcon}
            </div>
          </div>
        </div>`;
    });
    area.innerHTML = html;
    if (wasBottom || area.scrollTop === 0) area.scrollTop = area.scrollHeight;
  }

  // ── Send ──
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentContact) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value = '';
    input.style.height = '';

    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: currentContact, text, from: MY_NUMBER })
      });
      const data = await res.json();
      if (data.ok) {
        await loadMessages();
        await loadContacts();
      } else {
        showToast('Ошибка отправки: ' + (data.error || '?'), 'error');
        input.value = text;
      }
    } catch(e) {
      showToast('Сетевая ошибка', 'error');
      input.value = text;
    }
    btn.disabled = false;
    input.focus();
  }

  // ── New Chat Modal ──
  function openNewChat() {
    document.getElementById('new-chat-modal').classList.add('open');
    document.getElementById('new-to').focus();
  }

  function closeModal() {
    document.getElementById('new-chat-modal').classList.remove('open');
  }

  async function sendNew() {
    const to = document.getElementById('new-to').value.trim();
    const text = document.getElementById('new-body').value.trim();
    if (!to || !text) { showToast('Заполни все поля', 'error'); return; }

    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, text, from: MY_NUMBER })
      });
      const data = await res.json();
      if (data.ok) {
        closeModal();
        showToast('Отправлено!', 'success');
        await loadContacts();
        await openChat(to, MY_NUMBER);
      } else {
        showToast('Ошибка: ' + (data.error || '?'), 'error');
      }
    } catch(e) { showToast('Сетевая ошибка', 'error'); }
  }

  // ── Polling ──
  function startPolling() {
    clearInterval(pollingTimer);
    pollingTimer = setInterval(async () => {
      await loadContacts();
      if (currentContact) await loadMessages();
    }, 3000);
  }

  // ── Helpers ──
  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'Z');
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' });
  }

  function formatDate(d) {
    const now = new Date().toISOString().slice(0, 10);
    if (d === now) return 'Сегодня';
    const y = new Date(now) - new Date(d);
    if (y < 86400000) return 'Вчера';
    return new Date(d).toLocaleDateString('ru', { day: 'numeric', month: 'long' });
  }

  function statusEmoji(s) {
    const map = { sending: '⏳', delivered: '✓', sent: '✓', received: '✓✓', failed: '✗' };
    return map[s] || '·';
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
  }

  // ── Textarea auto-resize ──
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Modal close on bg click ──
  document.getElementById('new-chat-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Init ──
  loadContacts();
  startPolling();
</script>
</body>
</html>
